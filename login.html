<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0d3b2a" />
  <title>Login | Umuganda</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav class="u-navbar">
    <div class="u-container u-navbar-inner">
      <a href="index.html" class="u-brand">
        <span class="u-brand-mark"></span>
        Umuganda<span class="u-brand-dot">.</span>rw
      </a>
      <a href="index.html" class="btn btn-ghost btn-sm">
        <i class="bi bi-arrow-left"></i> <span class="u-hidden-mobile">Back</span>
      </a>
    </div>
  </nav>

  <div class="u-login-wrap">
    <div class="u-login-card u-fade-up">

      <div class="u-text-center u-mb-2">
        <div class="icon-circle"><i class="bi bi-shield-lock-fill"></i></div>
        <h2 class="u-mb-1" style="font-size:1.4rem;">Sign in</h2>
        <p class="u-text-muted u-mb-0" style="font-size:0.9rem;">Choose your role and enter your credentials</p>
      </div>

      <label class="u-form-label" style="margin-top:1rem;">I am a...</label>
      <div class="u-role-grid">
        <button type="button" class="u-role-btn active" data-role="leader">
          <span class="icon"><i class="bi bi-person-workspace"></i></span>
          Leader
        </button>
        <button type="button" class="u-role-btn" data-role="villager">
          <span class="icon"><i class="bi bi-people-fill"></i></span>
          Villager
        </button>
        <button type="button" class="u-role-btn" data-role="inspector">
          <span class="icon"><i class="bi bi-clipboard-check"></i></span>
          Inspector
        </button>
      </div>

      <form id="loginForm" novalidate>
        <div class="u-form-group">
          <label class="u-form-label" for="username">Username</label>
          <input type="text" id="username" class="u-input" placeholder="Enter your username" autocomplete="username" required />
        </div>
        <div class="u-form-group">
          <label class="u-form-label" for="password">Password</label>
          <input type="password" id="password" class="u-input" placeholder="Enter your password" autocomplete="current-password" required />
        </div>

        <div id="loginError" class="u-error" style="display:none;"></div>

        <button type="submit" class="btn btn-primary btn-block btn-lg">
          <i class="bi bi-box-arrow-in-right"></i> Sign In
        </button>

        <div class="u-hint">
          <strong>Demo credentials</strong><br />
          Leader: <code>leader</code> / <code>leader123</code><br />
          Villager: <code>villager</code> / <code>villager123</code><br />
          Inspector: <code>inspector</code> / <code>inspector123</code>
        </div>
      </form>

    </div>
  </div>

  <script src="js/script.js"></script>
  <script>
    let selectedRole = "leader";

    document.querySelectorAll(".u-role-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".u-role-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        selectedRole = btn.dataset.role;
        // Auto-fill demo username for convenience
        document.getElementById("username").value = selectedRole;
      });
    });

    document.getElementById("loginForm").addEventListener("submit", e => {
      e.preventDefault();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const errorBox = document.getElementById("loginError");

      const user = login(username, password, selectedRole);
      if (user) {
        errorBox.style.display = "none";
        toast("Welcome back, " + user.name.split(" ")[0] + "!");
        setTimeout(() => { window.location.href = user.role + ".html"; }, 600);
      } else {
        errorBox.innerHTML = '<i class="bi bi-exclamation-circle"></i> Invalid credentials for the selected role.';
        errorBox.style.display = "block";
      }
    });
  </script>
</body>
</html>
